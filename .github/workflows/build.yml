name: Build Windows EXE

on: 
  push:
    branches: [ main ]
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # هذا السطر يحل مشكلة التحذير التي ظهرت لك

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller flask waitress pyperclip

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --hidden-import=waitress --hidden-import=pyperclip app.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyWindowApp
        path: dist/app.exe
